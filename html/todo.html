<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Truculenta:opsz,wght@12..72,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles/global.css" />
    <link rel="stylesheet" href="../styles/todo.css" />
    <title>TO-DO || Dashy</title>
  </head>
  <body>
    <header>
      <div class="header-shape">
        <button class="arrow-btn" id="arrow-btn">←</button>
      </div>
    </header>
    <main>
      <section class="title-contain">
        <div class="emoji">
          <img src="../images/notepad.svg" alt="notebook" class="notebook" />
        </div>
        <div class="title"><h1>To-Do List</h1></div>
      </section>
      <section class="task-contain">
        <div class="task-list-container">
          <ul class="ul-task" id="task-list"></ul>
        </div>
      </section>
    </main>
    <footer><button class="add-task-btn" id="add-task-btn">+</button></footer>
    <script src="../js/todo.js"></script>
  </body>
</html>
