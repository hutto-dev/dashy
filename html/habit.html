<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Truculenta:opsz,wght@12..72,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles/global.css" />
    <link rel="stylesheet" href="../styles/habit.css" />
    <title>HABIT TRACKER || Dashy</title>
  </head>
  <body>
    <header>
      <h1>Title</h1>
      <p>Date</p>
    </header>
    <main>
      <section class="progress-section">
        <div class="progress-cirlce">circle</div>
        <div class="lvl-info">level info</div>
      </section>
      <section class="box-section">
        <div class="streak-box">streak</div>
        <div class="perfect-box">perfect</div>
        <div class="badge-box">badge</div>
      </section>
      <section class="habit-section">
        <p>TODAY'S HABITS</p>
        <div class="habit-box">
          <input type="checkbox" id="habit" class="checkbox" />
          <label for="habit" class="habit-label">Read 30 Minutes</label>
        </div>
      </section>
    </main>
    <script src="../js/habit.js"></script>
  </body>
</html>
